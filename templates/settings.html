
{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>⚙️ Settings</h2>

    <div class="row g-4 mt-2">

        <!-- ACCOUNT INFO -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-center">

                <i class="bi bi-person-circle fs-1"></i>

                <h5 class="mt-2">{{ session.get('username') }}</h5>

                <p class="text-muted">
                    {{ session.get('Email') }}
                </p>

                <hr>

               <small class="text-muted">
                    Role:
                    
                    {% if session.get('username') == 'mohini' %}
                        Admin
                    {% else %}
                        Student
                    {% endif %}
               </small>

            </div>
        </div>

        <!-- SETTINGS OPTIONS -->
        <div class="col-md-8">

            <div class="card shadow p-4">

                <h5>🔧 Account Settings</h5>

                <hr>

                <!-- EDIT PROFILE -->
                <a href="/edit_profile" class="btn btn-warning w-100 mb-2">
                    ✏️ Edit Profile
                </a>

                <!-- CHANGE PASSWORD -->
                <a href="/profile" class="btn btn-primary w-100 mb-2">
                    🔐 Change Password
                </a>

                <!-- NOTIFICATIONS TOGGLE -->
                <div class="form-check form-switch mt-3">
                    <input class="form-check-input" type="checkbox" id="notify">
                    <label class="form-check-label" for="notify">
                        🔔 Enable Notifications
                    </label>
                </div>

                <!-- DARK MODE (UI only) -->
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="darkMode">
                    <label class="form-check-label" for="darkMode">
                        🌙 Dark Mode 
                    </label>
                </div>

                <hr>

                <!-- DANGER ZONE -->

                <a href="/logout" class="btn btn-danger w-100">
                    🚪 Logout Account
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
