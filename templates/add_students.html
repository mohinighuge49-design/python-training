{% extends "base.html" %}
{% block title %}Add Students{% endblock %}
{% block content %}
 <div class="row justify-content-center">
    <div class="col-md-6 mb-10">
        <div class="card-header bg-dark  text-center text-white">
            <h2>Add Students</h2>
        </div>
          <div class="card shadow text-center mt-4">

                <div class="card-body p-4">
                <form action="{{url_for('add_student')}}" method="POST">

                <div class="mb-3 mt-2">
                <label class="form-label fw-bold"> name: <input required name = "name" class="form-control" placeholder="Enter Student name" type="text">
                <div class="mb-3 mt-2">
                <label class="form-label fw-bold">roll_no: <input required name = "roll_no" class="form-control" placeholder="Enter Student ID" type="text"> 
                <div class="mb-3 mt-2">
                <label class="form-label fw-bold">Subject: <input required name = "Subject"

                    class="form-control" placeholder="Enter subject" type="text">
                <div class="mb-3 mt-2">
                <label class="form-label fw-bold">marks: <input required name = "marks" class="form-control" placeholder="Enter Student marks" type="number">
                <div class="d-grid gap-2 mt-4">
                <button class="btn btn-primary fw-bold" type="submit">Add Student</button>
                </div>
            
                </form>
            </div>
        </div>
    </div>
    <a href="/about" class="btn btn-info btn-lg mb-2 mt-4"><--Back to home</a>
 </div>

     <footer style="background-color: #052349;" class="text-white text-center py-3 mt-3">
        <small>
            🎓 College Portal &nbsp;|&nbsp;
            Built with Python + Flask + Bootstrap &nbsp;🎓&nbsp;
        </small>
    </footer>

{% endblock %}
