{% extends "base.html" %}

{% block content %}

<style>

.chat-card{
    border:none;
    border-radius:30px;
    overflow:hidden;
    background:white;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.chat-header{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    text-align:center;
    padding:25px;
}

.chat-header h2{
    font-weight:700;
}

#chatMessages{
    height:500px;
    overflow-y:auto;
    padding:25px;
    background:linear-gradient(to bottom,#f8f9ff,#ffffff);
}

.user-msg{
    display:flex;
    justify-content:flex-end;
    margin-bottom:15px;
}

.user-msg span{
    background:linear-gradient(135deg,#198754,#20c997);
    color:white;
    padding:12px 18px;
    border-radius:20px 20px 5px 20px;
    max-width:75%;
    box-shadow:0 5px 15px rgba(25,135,84,.25);
}

.bot-msg{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin-bottom:15px;
}

.bot-msg span{
    background:white;
    color:#333;
    padding:12px 18px;
    border-radius:20px 20px 20px 5px;
    border:1px solid #e9ecef;
    max-width:75%;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.chat-input{
    border:none;
    border-radius:50px;
    padding:15px;
    background:#f8f9fa;
}

.chat-input:focus{
    box-shadow:0 0 0 0.2rem rgba(20, 93, 203, 0.25);
    background:white;
}

.voice-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
    margin-left:10px;
    background:linear-gradient(135deg,#dc3545,#ff6b6b);
}

.send-btn{
    border-radius:50px;
    padding:0 30px;
    margin-left:10px;
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    border:none;
}

.voice-btn:hover,
.send-btn:hover{
    transform:translateY(-2px) scale(1.05);
}

.typing{
    font-style:italic;
    color:#666;
    margin-bottom:15px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}

#chatMessages::-webkit-scrollbar{
    width:8px;
}

#chatMessages::-webkit-scrollbar-thumb{
    background:#cfd8dc;
    border-radius:20px;
}

</style>

<div class="container py-5">

    <div class="card chat-card">

        <div class="chat-header">
            <h2>🤖 College AI Assistant</h2>
            <small>
                Ask about students, marks, subjects and college information
            </small>
        </div>

        <div class="card-body">

            <div id="chatMessages">

                <div class="bot-msg">

                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
                         width="40">

                    <span>
                        👋 Hello Student! I am your College AI Assistant.
                    </span>

                </div>

            </div>

            <div class="d-flex align-items-center mt-3">

                <input
                    type="text"
                    id="userInput"
                    class="form-control chat-input "
                    placeholder="💬 Ask anything..."
                    onkeypress="if(event.key==='Enter') sendMessage()"
                >
                

                <button
                    class="btn voice-btn"
                    onclick="startVoice()">
                    🎤
                </button>

                <button
                    class="btn text-white send-btn"
                    onclick="sendMessage()">
                    🚀 Send
                </button>

            </div>

        </div>

    </div>

</div>

<script>

function sendMessage(){

    let input =
    document.getElementById("userInput");

    let msg =
    input.value.trim();

    if(msg==="") return;

    let chat =
    document.getElementById("chatMessages");

    chat.innerHTML += `
    <div class="user-msg">
        <span>${msg}</span>
    </div>
    `;

    chat.innerHTML += `
    <div id="typing" class="typing">
        🤖 AI is typing...
    </div>
    `;

    chat.scrollTop =
    chat.scrollHeight;

    fetch("/chatbot",{
        method:"POST",
        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },
        body:"message="+encodeURIComponent(msg)
    })

    .then(res=>res.json())

    .then(data=>{

        document
        .getElementById("typing")
        .remove();

        chat.innerHTML += `
        <div class="bot-msg">

            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
                 width="40">

            <span>
                🤖 ${data.reply}
            </span>

        </div>
        `;

        speak(data.reply);

        chat.scrollTop =
        chat.scrollHeight;
    });

    input.value="";
}

function startVoice(){

    const recognition = new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.onresult = function(event){

        let text = event.results[0][0].transcript;

        console.log("VOICE:", text);

        document.getElementById("userInput").value = text;

        sendMessage();
    };

    recognition.onerror = function(e){
        console.log("VOICE ERROR:", event.error);
    };

    recognition.start();
}
function speak(text){

    window.speechSynthesis.cancel();

    let speech =
    new SpeechSynthesisUtterance(text);

    speech.lang="en-US";
    speech.rate=1;
    speech.pitch=1;
    speech.volume=1;

    window.speechSynthesis.speak(speech);
}

</script>

{% endblock %}
