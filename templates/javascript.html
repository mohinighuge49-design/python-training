<!DOCTYPE html>
<html>
    <head>
        <title> Live Search </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container mt-4">
            <h2 class ="fw-bold mb-4">Student Live Search Demo </h2>

            <!-- Search input -->
            <input type="text"
            id ="searchInput"
            class="form-control mb-3"
            placeholder = "Type to search...">

            <!-- Table -->
            <table class ="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Marks</th>
                        <th>Subject</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    <tr data-name ="mohini Ghuge">
                        <!-- data-name - JS information  -->
                        <td>mohini Ghuge</td>
                        <td>101</td>
                        <td>95</td>
                        <td>Java</td>
                    </tr>
                    <tr data-name ="vaishnavi deshmukh">
                        <!-- data-name - JS information  -->
                        <td>Vaishnavi Deshmukh</td>
                        <td>102</td>
                        <td>90</td>
                        <td>Python</td>
                    </tr>
                    <tr data-name ="poonam kurhe">
                        <!-- data-name - JS information  -->
                        <td>poonam kurhe</td>
                        <td>103</td>
                        <td>85</td>
                        <td>Javascript</td>
                    </tr>
                    <tr data-name ="dnyaneshwari suryavanshi">
                        <!-- data-name - JS information  -->
                        <td>dnyaneshwari suryavanshi</td>
                        <td>104</td>
                        <td>88</td>
                        <td>C++</td>
                    </tr>
                    <tr data-name ="pallavi Borkar">
                        <!-- data-name - JS information  -->
                        <td>pallavi Borkar</td>
                        <td>105</td>
                        <td>92</td>
                        <td>DBMS</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <script>
            const searchInput = document.getElementById('searchInput');
            const allRows = document.querySelectorAll('#tableBody tr');
            
            searchInput.addEventListener('keyup', function() {
                const query = this.value.toLowerCase();
                allRows.forEach(function(row) {
                    const name = row.dataset.name;

                    if(name.includes(query)){
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });      
        </script>   
    </body>
</html>
